<!DOCTYPE html>
<html lang="en">

  <meta charset="UTF-8">

  <meta

  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="main-nav">
  <h1>PathForge</h1>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="jobs.html">Jobs</a>

    <a id="dashboardLink" href="dashboard.html">
      Dashboard
    </a>

    <a id="profileLink" href="profile.html">

    </a>

    <a

    </a>

    <a id="loginLink" href="login.html">

    </a>

    <a id="registerLink" href="register.html">

    </a>

    <a

      type="button"

<script src="script.js"></script>
