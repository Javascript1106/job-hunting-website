<!DOCTYPE html>
<html>
<head>
  <title>Login - PathForge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="main-nav">
  <h1>PathForge</h1>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="jobs.html">Jobs</a>

    <a id="loginLink" href="login.html">Login</a>
    <a id="registerLink" href="register.html">Register</a>

    <a href="employer.html">Employer Dashboard</a>

    <span id="userStatus"></span>

    <button id="logoutButton" class="nav-logout">
      Logout
    </button>
  </div>
</nav>

<main class="auth-container">
  <h2>Log In to PathForge</h2>
  <p>Welcome back. Log in to continue.</p>

  <form id="loginForm" class="auth-form">
    <input 
    type="text" 
    id="loginIdentifier" 
    placeholder="Email or Username" 
    required
>
    <input type="password" id="loginPassword" placeholder="Password" required>

    <button type="submit">Log In</button>
  </form>

  <p id="loginMessage" class="auth-message"></p>
</main>

<script src="script.js"></script>

</body>
</html>
