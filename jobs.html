<!DOCTYPE html>
<html>
<head>
  <title>Jobs</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <h1>PathForge</h1>

  <a href="index.html">Home</a>
  <a href="jobs.html">Jobs</a>
  <a href="login.html">Login</a>
  <a href="register.html">Register</a>
  <a href="employer.html">Employer Dashboard</a>
</nav>

<main>
  <section class="jobs-header">
    <h2>Find Jobs</h2>

    <div class="job-search-bar">
      <input id="jobSearchInput" type="text" placeholder="Search job title or company">
      <input id="locationSearchInput" type="text" placeholder="Location">

      <select id="categoryFilter">
        <option value="all">All Categories</option>
      </select>

      <button>Search</button>
    </div>
  </section>

  <section class="jobs-layout">
    <div class="job-listings" id="jobListings">
      <!-- Jobs load here from the database -->
    </div>
  </section>
</main>

<button id="chatToggleButton" onclick="toggleChat()">
  💬 Ask PathForge AI
</button>

<section class="chatbot hidden-chat" id="chatbotWindow">
  <div class="chat-header">
    <div>
      <h3>AI Job Assistant</h3>
      <p>Ask about jobs, resumes, interviews, or schedules.</p>
    </div>

    <button class="close-chat" onclick="toggleChat()">✕</button>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="bot-message">
      Hi! I can help with jobs, resumes, interviews, and career planning.
    </div>
  </div>

  <div class="chat-input-area">
    <input id="chatInput" type="text" placeholder="Ask the job assistant...">
    <button onclick="sendMessage()">Send</button>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
