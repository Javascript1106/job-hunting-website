<!DOCTYPE html>
<html>
<head>
  <title>Jobs</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <h1>JobFinder</h1>

  <a href="index.html">Home</a>
  <a href="jobs.html">Jobs</a>
  <a href="login.html">Login</a>
  <a href="register.html">Register</a>
  <a href="employer.html">Employer Dashboard</a>
</nav>

<main>
  <section class="jobs-header">
    <h2>Find Jobs</h2>

    <div class="job-search-bar">
      <input id="jobSearchInput" type="text" placeholder="Search job title or company">
      <input id="locationSearchInput" type="text" placeholder="Location">

      <select id="categoryFilter">
        <option value="all">All Categories</option>
      </select>

      <button>Search</button>
    </div>
  </section>

  <section class="jobs-layout">
  <div class="job-listings" id="jobListings">
    <!-- Jobs load here from jobs.json -->
  </div>

  <section class="chatbot jobs-chatbot">
    <div class="chat-header">
      <h3>AI Job Assistant</h3>
      <p>Ask about jobs, resumes, interviews, or schedules.</p>
    </div>

    <div id="chatBox" class="chat-box">
      <div class="bot-message">Hi! How can I help with your job search?</div>
    </div>

    <div class="chat-input-area">
      <input id="chatInput" type="text" placeholder="Type your message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </section>
</section>
</main>

<script src="script.js"></script>
</body>
</html>
