<!DOCTYPE html>
<html>
<head>
  <title>Register - PathForge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="main-nav">
    <h1>PathForge</h1>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="jobs.html">Jobs</a>

        <a id="dashboardLink" href="dashboard.html">
            Dashboard
        </a>

        <a id="profileLink" href="profile.html">
            Profile
        </a>

        <a id="savedJobsLink" href="saved-jobs.html">
            Saved Jobs
        </a>

        <a id="applicationsLink" href="applications.html">
            Applications
        </a>

        <a id="employerAccessLink" href="employer-access.html">
            Employer Access
        </a>

        <a id="loginLink" href="login.html">

        <a id="registerLink" href="register.html">

        <a id="employerDashboardLink" href="employer.html">
            Employer Dashboard
        </a>

        <button id="logoutButton" class="nav-logout">
            Logout
        </button>
    </div>
</nav>

<main class="auth-container">
  <h2>Create Your PathForge Account</h2>
  <p>Sign up to start using PathForge.</p>

  <form id="registerForm" class="auth-form">
    <input type="text" id="registerUsername" placeholder="Username" required>
    <input type="email" id="registerEmail" placeholder="Email" required>
    <input type="password" id="registerPassword" placeholder="Password" required>

    <button type="submit">Create Account</button>
  </form>

  <p id="registerMessage" class="auth-message"></p>
</main>

<script src="script.js"></script>
</body>
</html>
