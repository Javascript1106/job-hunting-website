<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Employer Access - PathForge</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="main-nav">
  <h1>PathForge</h1>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="jobs.html">Jobs</a>

    <a id="dashboardLink" href="dashboard.html">
      Dashboard
    </a>

    <a id="profileLink" href="profile.html">
      Profile
    </a>

    <a id="savedJobsLink" href="saved-jobs.html">
      Saved Jobs
    </a>

    <a id="applicationsLink" href="applications.html">
      Applications
    </a>

    <a id="employerAccessLink" href="employer-access.html">
      Employer Access
    </a>

    <a id="loginLink" href="login.html">
      Login
    </a>

    <a id="registerLink" href="register.html">
      Register
    </a>

    <a id="employerDashboardLink" href="employer.html">
      Employer Dashboard
    </a>

    <button id="logoutButton" class="nav-logout">
      Logout
    </button>
  </div>
</nav>

<main class="employer-access-container">

  <section class="employer-access-card">

    <p class="dashboard-eyebrow">
      Employer Approval
    </p>

    <h2>Unlock Employer Access</h2>

    <p>
      Enter the one-time Employer Access Code supplied by PathForge.
      A valid code will permanently upgrade your account to an employer account.
    </p>

    <form id="employerAccessForm" class="auth-form">

      <label for="employerAccessCode">
        Employer Access Code
      </label>

      <input
        type="text"
        id="employerAccessCode"
        placeholder="Enter your access code"
        autocomplete="off"
        required
      >

      <button type="submit">
        Verify Access Code
      </button>

    </form>

    <p
      id="employerAccessMessage"
      class="auth-message"
      aria-live="polite"
    ></p>

  </section>

</main>

<script src="script.js"></script>

</body>
</html>
